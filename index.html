var T = '#1ab2b1';
var C = '#f4f2e8';

function Logo(props) {
  var sz = props.sz;
  var r = props.r !== undefined ? props.r : Math.round(sz * 0.25);
  return (
    <img
      src={window.PP_ICON}
      style={{width: sz, height: sz, borderRadius: r, objectFit: 'cover', flexShrink: 0, display: 'block'}}
      alt="Pinpoint"
    />
  );
}

function App() {
  var stageState = useState('start');
  var stage = stageState[0];
  var setStage = stageState[1];

  var msgsState = useState([]);
  var msgs = msgsState[0];
  var setMsgs = msgsState[1];

  var histState = useState([]);
  var hist = histState[0];
  var setHist = histState[1];

  var inputState = useState('');
  var input = inputState[0];
  var setInput = inputState[1];

  var busyState = useState(false);
  var busy = busyState[0];
  var setBusy = busyState[1];

  var resultState = useState(null);
  var result = resultState[0];
  var setResult = resultState[1];

  var consentState = useState(false);
  var consent = consentState[0];
  var setConsent = consentState[1];

  var mtypeState = useState('residential');
  var mtype = mtypeState[0];
  var setMtype = mtypeState[1];

  var endRef = useRef(null);
  var inputRef = useRef(null);

  useEffect(function() {
    if (endRef.current) {
      endRef.current.scrollIntoView({behavior: 'smooth'});
    }
  }, [msgs, busy]);

  function callAPI(history) {
    return fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 700,
        system: window.PP_SYS,
        messages: history
      })
    }).then(function(resp) {
      return resp.json();
    }).then(function(data) {
      if (data.error) throw new Error(data.error.message);
      if (data.content && data.content[0] && data.content[0].text) {
        return data.content[0].text;
      }
      return '';
    });
  }

  function startChat() {
    setStage('chat');
    setBusy(true);
    var initMsg = {
      role: 'user',
      content: 'Client is starting a ' + mtype + ' mortgage product transfer fact find. Today is ' + window.PP_TODAY + '. Please give a warm brief welcome mentioning Pinpoint Finance and ask for their first name.'
    };
    callAPI([initMsg]).then(function(reply) {
      var newHist = [initMsg, {role: 'assistant', content: reply}];
      setHist(newHist);
      setMsgs([{role: 'assistant', content: reply}]);
      setBusy(false);
      setTimeout(function() {
        if (inputRef.current) inputRef.current.focus();
      }, 150);
    }).catch(function() {
      setMsgs([{role: 'assistant', content: 'Hi there! Welcome to Pinpoint Finance. I am here to help with your product transfer today. Could I start by asking your first name?'}]);
      setBusy(false);
    });
  }

  function sendMsg() {
    if (!input.trim() || busy) return;
    var txt = input.trim();
    setInput('');
    var newMsgs = msgs.concat([{role: 'user', content: txt}]);
    setMsgs(newMsgs);
    setBusy(true);
    var newHist = hist.concat([{role: 'user', content: txt}]);

    callAPI(newHist).then(function(reply) {
      if (reply.indexOf('"complete":true') !== -1 || reply.indexOf('"complete": true') !== -1) {
        try {
          var start = reply.indexOf('{');
          var end = reply.lastIndexOf('}');
          if (start !== -1 && end !== -1) {
            var parsed = JSON.parse(reply.substring(start, end + 1));
            if (parsed.complete && parsed.data) {
              setResult(parsed.data);
              setStage('done');
              setBusy(false);
              return;
            }
          }
        } catch(e) {}
      }
      setHist(newHist.concat([{role: 'assistant', content: reply}]));
      setMsgs(newMsgs.concat([{role: 'assistant', content: reply}]));
      setBusy(false);
    }).catch(function() {
      setMsgs(function(prev) {
        return prev.concat([{role: 'assistant', content: 'Sorry, something went wrong. Please try again in a moment.'}]);
      });
      setBusy(false);
    });
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  }

  function toggleConsent() {
    setConsent(function(c) { return !c; });
  }

  // ── START SCREEN ──────────────────────────────────────────────
  if (stage === 'start') {
    return (
      <div style={{width: '100%', maxWidth: 530, background: '#fff', borderRadius: 22, boxShadow: '0 20px 70px rgba(8,58,70,.32)', overflow: 'hidden', animation: 'fadeIn .35s ease'}}>

        <div style={{background: N, padding: '28px 26px 22px'}}>
          <div style={{display: 'flex', alignItems: 'center', gap: 16, marginBottom: 14}}>
            <Logo sz={58} r={15} />
            <div>
              <div style={{fontSize: 9, textTransform: 'uppercase', letterSpacing: '3px', color: T, fontWeight: 700, marginBottom: 5}}>Pinpoint Finance</div>
              <div style={{fontSize: 21, fontWeight: 900, color: '#fff', lineHeight: 1.2}}>Product Transfer<br/>Fact Find</div>
            </div>
          </div>
          <div style={{fontSize: 13, color: 'rgba(255,255,255,.55)', lineHeight: 1.65}}>
            FCA Regulated · No broker fee on like-for-like switches · York based team
          </div>
        </div>

        <div style={{padding: '22px 26px 0'}}>
          <div style={{fontSize: 10, fontWeight: 700, color: N, textTransform: 'uppercase', letterSpacing: '2px', marginBottom: 11}}>Mortgage Type</div>
          <div style={{display: 'flex', gap: 10, marginBottom: 20}}>
            {['residential', 'buy-to-let'].map(function(t) {
              var active = mtype === t;
              return (
                <button key={t} onClick={function() { setMtype(t); }} style={{flex: 1, padding: '12px 8px', borderRadius: 11, border: '2px solid ' + (active ? T : '#d4e4e6'), background: active ? '#e6f5f5' : '#fff', color: active ? N : '#3d6b74', fontFamily: 'Lato,sans-serif', fontWeight: 700, fontSize: 13, cursor: 'pointer', transition: 'all .2s'}}>
                  {t === 'residential' ? '🏠 Residential' : '🏘 Buy-to-Let'}
                </button>
              );
            })}
          </div>

          <div style={{background: C, borderRadius: 12, padding: '14px 16px', marginBottom: 16, fontSize: 13, color: '#3d6b74', lineHeight: 1.75}}>
            <strong style={{color: N, display: 'block', marginBottom: 4}}>Before we begin</strong>
            We start with just your name and contact details so we can reach you even if you need to stop. All data held securely under UK GDPR and never sold to third parties.
          </div>

          <div onClick={toggleConsent} style={{display: 'flex', alignItems: 'flex-start', gap: 12, cursor: 'pointer', marginBottom: 22}}>
            <div style={{width: 22, height: 22, borderRadius: 6, flexShrink: 0, marginTop: 1, border: '2px solid ' + (consent ? N : '#ccc'), background: consent ? N : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all .2s'}}>
              {consent && <span style={{color: '#fff', fontSize: 13, fontWeight: 900}}>&#10003;</span>}
            </div>
            <span style={{fontSize: 13, color: '#3d6b74', lineHeight: 1.65}}>
              I consent to Pinpoint Finance collecting and processing my personal data to assess my mortgage options and contact me about their services.
            </span>
          </div>
        </div>

        <div style={{padding: '0 26px 26px'}}>
          <button disabled={!consent} onClick={startChat} style={{width: '100%', padding: 16, borderRadius: 12, border: 'none', background: consent ? 'linear-gradient(135deg,#083a46,#14586b)' : '#e2e8f0', color: consent ? '#fff' : '#aaa', fontSize: 15, fontWeight: 700, cursor: consent ? 'pointer' : 'default', fontFamily: 'Lato,sans-serif', letterSpacing: '.3px', transition: 'all .2s'}}>
            {consent ? 'Start My Free Mortgage Check \u2192' : 'Please agree above to continue'}
          </button>
          <div style={{textAlign: 'center', marginTop: 11, fontSize: 11, color: '#999'}}>
            &#128274; FCA ref 733225 &middot; NACFB Member &middot; 150+ Google Reviews
          </div>
        </div>
      </div>
    );
  }

  // ── CHAT SCREEN ───────────────────────────────────────────────
  if (stage === 'chat') {
    return (
      <div style={{width: '100%', maxWidth: 530, background: '#fff', borderRadius: 22, boxShadow: '0 20px 70px rgba(8,58,70,.32)', overflow: 'hidden', display: 'flex', flexDirection: 'column', animation: 'fadeIn .25s ease'}}>

        <div style={{background: N, padding: '13px 18px', display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0}}>
          <Logo sz={36} r={10} />
          <div style={{flex: 1}}>
            <div style={{fontWeight: 900, color: '#fff', fontSize: 14}}>Pinpoint Finance</div>
            <div style={{fontSize: 10, color: 'rgba(255,255,255,.5)', letterSpacing: '1px', textTransform: 'uppercase'}}>
              {mtype === 'residential' ? 'Residential' : 'Buy-to-Let'} &middot; Product Transfer &middot; FCA Regulated
            </div>
          </div>
          <div style={{display: 'flex', alignItems: 'center', gap: 5, background: 'rgba(255,255,255,.08)', padding: '5px 10px', borderRadius: 20}}>
            <div style={{width: 7, height: 7, background: '#4ade80', borderRadius: '50%', animation: 'pulse 2s infinite'}} />
            <span style={{fontSize: 10, color: 'rgba(255,255,255,.5)', fontWeight: 700, letterSpacing: '1px'}}>LIVE</span>
          </div>
        </div>

        <div style={{flex: 1, overflowY: 'auto', padding: '18px 14px', display: 'flex', flexDirection: 'column', gap: 12, minHeight: 400, maxHeight: 500}}>
          {msgs.map(function(m, i) {
            var isUser = m.role === 'user';
            return (
              <div key={i} style={{display: 'flex', justifyContent: isUser ? 'flex-end' : 'flex-start', alignItems: 'flex-end', gap: isUser ? 0 : 9, animation: 'fadeIn .22s ease'}}>
                {!isUser && <Logo sz={29} r={8} />}
                <div style={{maxWidth: '80%', padding: '12px 15px', borderRadius: isUser ? '16px 16px 4px 16px' : '16px 16px 16px 4px', background: isUser ? 'linear-gradient(135deg,#083a46,#14586b)' : C, color: isUser ? '#fff' : N, fontSize: 14, lineHeight: 1.75, whiteSpace: 'pre-wrap', wordBreak: 'break-word', boxShadow: isUser ? '0 3px 10px rgba(8,58,70,.2)' : '0 1px 5px rgba(8,58,70,.07)'}}>
                  {m.content}
                </div>
              </div>
            );
          })}

          {busy && (
            <div style={{display: 'flex', alignItems: 'flex-end', gap: 9}}>
              <Logo sz={29} r={8} />
              <div style={{padding: '13px 16px', background: C, borderRadius: '16px 16px 16px 4px', display: 'flex', gap: 5, alignItems: 'center', boxShadow: '0 1px 5px rgba(8,58,70,.07)'}}>
                {[0, 1, 2].map(function(i) {
                  return <div key={i} style={{width: 8, height: 8, borderRadius: '50%', background: T, animation: 'bounce 1.2s infinite', animationDelay: (i * 0.18) + 's'}} />;
                })}
              </div>
            </div>
          )}
          <div ref={endRef} />
        </div>

        <div style={{padding: '10px 14px 16px', borderTop: '1px solid rgba(8,58,70,.08)', flexShrink: 0}}>
          <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
            <input
              ref={inputRef}
              value={input}
              onChange={function(e) { setInput(e.target.value); }}
              onKeyDown={handleKey}
              placeholder="Type your answer and press Enter..."
              style={{flex: 1, padding: '13px 15px', border: '2px solid #d4e4e6', borderRadius: 12, fontSize: 14, color: N, fontFamily: 'Lato,sans-serif', outline: 'none', background: '#fff', transition: 'border-color .2s'}}
              onFocus={function(e) { e.target.style.borderColor = T; }}
              onBlur={function(e) { e.target.style.borderColor = '#d4e4e6'; }}
            />
            <button
              onClick={sendMsg}
              disabled={!input.trim() || busy}
              style={{width: 46, height: 46, borderRadius: 12, border: 'none', background: (input.trim() && !busy) ? 'linear-gradient(135deg,#083a46,#14586b)' : '#e2e8f0', color: '#fff', fontSize: 20, cursor: (input.trim() && !busy) ? 'pointer' : 'default', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all .2s'}}
            >
              &#8593;
            </button>
          </div>
          <div style={{fontSize: 10, color: '#bbb', textAlign: 'center', marginTop: 7, letterSpacing: '.3px'}}>
            Press Enter to send &middot; &#128274; GDPR compliant &middot; FCA ref 733225
          </div>
        </div>
      </div>
    );
  }

  // ── DONE SCREEN ───────────────────────────────────────────────
  if (stage === 'done' && result) {
    var isRemortgage = result.path && result.path.toLowerCase().indexOf('remortgage') !== -1;
    var fields = [
      ['First Name', result.firstName],
      ['Last Name', result.lastName],
      ['Phone', result.phone],
      ['Email', result.email],
      ['Address', result.address],
      ['Postcode', result.postcode],
      ['Current Lender', result.lender],
      ['Account Number', result.accountNumber],
      ['Outstanding Balance', result.balance],
      ['Property Value', result.propertyValue],
      ['Deal Expiry', result.dealExpiry],
      ['Route', result.path],
      ['Joint Names', result.jointNames],
      ['Joint Phone', result.jointPhone],
      ['Joint Email', result.jointEmail],
      ['Product Type', result.productType],
      ['Max Monthly Payment', result.maxPayment],
      ['Household Income', result.income],
      ['Financial Commitments', result.commitments],
      ['Mortgage Term', result.term]
    ].filter(function(row) { return row[1] && row[1] !== ''; });

    return (
      <div style={{width: '100%', maxWidth: 530, background: '#fff', borderRadius: 22, boxShadow: '0 20px 70px rgba(8,58,70,.32)', overflow: 'hidden', animation: 'fadeIn .4s ease'}}>

        <div style={{background: 'linear-gradient(135deg,#083a46,#14586b)', padding: '32px 26px', textAlign: 'center'}}>
          <div style={{width: 60, height: 60, borderRadius: '50%', background: 'rgba(26,178,177,.2)', border: '2px solid rgba(26,178,177,.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', fontSize: 26}}>&#10003;</div>
          <div style={{fontSize: 23, fontWeight: 900, color: '#fff', marginBottom: 8}}>
            All done{result.firstName ? ', ' + result.firstName : ''}!
          </div>
          <div style={{fontSize: 13, color: 'rgba(255,255,255,.6)', lineHeight: 1.7}}>
            {isRemortgage
              ? 'We will compare your existing lender rates and the wider market and be in touch within one working day.'
              : 'We will handle your product transfer and be in touch within one working day with your options.'}
          </div>
        </div>

        <div style={{padding: '22px 26px'}}>
          <div style={{fontSize: 10, fontWeight: 700, color: T, textTransform: 'uppercase', letterSpacing: '2px', marginBottom: 14}}>Your Submission</div>
          {fields.map(function(row) {
            return (
              <div key={row[0]} style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', padding: '8px 0', borderBottom: '1px solid #f0ede6', fontSize: 13}}>
                <span style={{color: '#3d6b74', flexShrink: 0, marginRight: 12}}>{row[0]}</span>
                <span style={{color: N, fontWeight: 700, textAlign: 'right', maxWidth: '58%', wordBreak: 'break-word'}}>{row[1]}</span>
              </div>
            );
          })}
          <div style={{marginTop: 18, padding: '13px 15px', background: '#e6f5f5', borderRadius: 12, border: '1px solid rgba(26,178,177,.3)', fontSize: 12, color: '#0b7181', lineHeight: 1.7}}>
            &#128274; Data held securely under UK GDPR. To request deletion email <strong>hello@pinpoint.finance</strong>. Pinpoint Commercial Finance Ltd &middot; FCA 733225.
          </div>
          <div style={{display: 'flex', gap: 10, marginTop: 14}}>
            <a href="tel:01904866100" style={{flex: 1, padding: '13px 8px', background: N, color: '#fff', borderRadius: 11, textAlign: 'center', fontSize: 13, fontWeight: 700, display: 'block', textDecoration: 'none'}}>
              &#128222; 01904 866 100
            </a>
            <a href="mailto:hello@pinpoint.finance" style={{flex: 1, padding: '13px 8px', background: C, color: N, borderRadius: 11, textAlign: 'center', fontSize: 13, fontWeight: 700, display: 'block', textDecoration: 'none', border: '1.5px solid #d4e4e6'}}>
              &#9993; hello@pinpoint.finance
            </a>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.render(React.createElement(App, null), document.getElementById('root'));
</script>
</body>
</html>
